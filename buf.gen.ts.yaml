version: v2
managed:
  enabled: true
plugins:
  - local: protoc-gen-ts_proto
    out: gen/ts
    opt:
      - outputServices=nice-grpc
      - outputServices=generic-definitions
      - env=node
      - useOptionals=messages
      - exportCommonSymbols=true
      - esModuleInterop=true
      - oneof=unions
      - stringEnums=true
      - useDate=string
      - outputTypeAnnotations=true
      - outputIndex=true
