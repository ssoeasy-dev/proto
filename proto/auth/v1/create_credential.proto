syntax = "proto3";

package auth.v1;

import "auth/v1/models/credential.proto";

message CreateCredentialsRequest {
  string employee_id = 1;
  string password = 2;
}

message CreateCredentialsResponse {
  auth.v1.models.Credential credential = 1;
}

message CreateCredentialsCompinsateRequest {
  string credential_id = 1;
}

message CreateCredentialsCompinsateResponse {
  bool success = 1;
  string message = 2;
}
