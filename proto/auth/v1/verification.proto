syntax = "proto3";

package auth.v1;

import "auth/v1/common.proto";

service VerificationService {
  rpc Verificate(VerificateRequest) returns (auth.v1.StatusResponse);
  rpc Refresh(RefreshRequest) returns (Verification);
  rpc CheckStatus(CheckStatusRequest) returns (CheckStatusResponse);
}

enum VerificationType {
  email_code = 0;
  email_link = 1;
}

message Verification {
	string id = 1;
	string value = 2;
	int64 expires_at = 3;
}

message VerificateRequest {
  string id = 1;
  string value = 2;
}

message RefreshRequest {
  string user_id = 1;
  VerificationType type = 2;
}

enum VerificationStatus {
  wait = 0;
  expires = 1;
  verified = 2;
}

message CheckStatusRequest {
  string id = 1;
}

message CheckStatusResponse {
  VerificationStatus status = 1;
}
