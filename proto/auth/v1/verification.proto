syntax = "proto3";

package auth.v1;

import "auth/v1/models/verification_code.proto";

service VerificationService {
  rpc GenerateVerificationCode(GenerateVerificationCodeRequest) returns (GenerateVerificationCodeResponse);
  rpc GenerateVerificationCodeCompensate(GenerateVerificationCodeCompensateRequest) returns (GenerateVerificationCodeCompensateResponse);

  rpc VerificateCode(VerificateCodeRequest) returns (VerificateCodeResponse);
}

enum ContactType {
  CONTACT_TYPE_UNSPECIFIED = 0;
  CONTACT_TYPE_EMAIL = 1;
  CONTACT_TYPE_PHONE = 2;
}

message GenerateVerificationCodeRequest {
  string employee_id = 1;
  ContactType contact_type = 2;
  string contact = 3;
}

message GenerateVerificationCodeResponse {
  auth.v1.models.VerificationCode verification_code = 1;
  string code = 2;
}

message GenerateVerificationCodeCompensateRequest {
  string verification_code_id = 1;
}

message GenerateVerificationCodeCompensateResponse {
  bool success = 1;
  string message = 2;
}

message VerificateCodeRequest {
  string id = 1;
  string value = 2;
  string type = 3;
  string company_id = 4;
  string service_id = 5;
}

message VerificateCodeResponse {
  string access = 1;
  string refresh = 2;
}
