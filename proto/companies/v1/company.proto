syntax = "proto3";

package companies.v1;

service CompanyService {
  rpc CreateCompany(CreateCompanyRequest) returns (CompanyResponse);
  rpc UpdateCompanyOwner(UpdateCompanyOwnerRequest) returns (CompanyResponse);
  rpc CreateEmployee(CreateEmployeeRequest) returns (EmployeeResponse);
  rpc LinkEmployeeToCompany(LinkEmployeeToCompanyRequest) returns (LinkEmployeeToCompanyResponse);
  rpc CreateSubscription(CreateSubscriptionRequest) returns (SubscriptionResponse);
  
  // Compensating transactions
  rpc DeleteCompany(DeleteCompanyRequest) returns (DeleteCompanyResponse);
  rpc DeleteEmployee(DeleteEmployeeRequest) returns (DeleteEmployeeResponse);
  rpc UnlinkEmployeeFromCompany(UnlinkEmployeeFromCompanyRequest) returns (UnlinkEmployeeFromCompanyResponse);
  rpc DeleteSubscription(DeleteSubscriptionRequest) returns (DeleteSubscriptionResponse);
  rpc ClearCompanyOwner(ClearCompanyOwnerRequest) returns (CompanyResponse);
}

message CreateCompanyRequest {
  string email = 1;
  string name = 2;
  optional string description = 3;
}

message UpdateCompanyOwnerRequest {
  string company_id = 1;
  string owner_id = 2;
}

message CompanyResponse {
  string id = 1;
  string email = 2;
  string name = 3;
  optional string description = 4;
  bool is_active = 5;
  optional string owner_id = 6;
  int64 created_at = 7;
}

message CreateEmployeeRequest {
  string email = 1;
  optional string first_name = 2;
  optional string last_name = 3;
}

message EmployeeResponse {
  string id = 1;
  string email = 2;
  optional string first_name = 3;
  optional string last_name = 4;
  bool is_active = 5;
  int64 created_at = 6;
}

message LinkEmployeeToCompanyRequest {
  string employee_id = 1;
  string company_id = 2;
}

message LinkEmployeeToCompanyResponse {
  string id = 1;
  string employee_id = 2;
  string company_id = 3;
  int64 created_at = 4;
}

message CreateSubscriptionRequest {
  string company_id = 1;
  string service_id = 2;
}

message SubscriptionResponse {
  string id = 1;
  string company_id = 2;
  string service_id = 3;
  bool is_active = 4;
  int64 created_at = 5;
}

// Compensating transaction messages
message DeleteCompanyRequest {
  string company_id = 1;
}

message DeleteCompanyResponse {
  bool success = 1;
  string message = 2;
}

message DeleteEmployeeRequest {
  string employee_id = 1;
}

message DeleteEmployeeResponse {
  bool success = 1;
  string message = 2;
}

message UnlinkEmployeeFromCompanyRequest {
  string employee_id = 1;
  string company_id = 2;
}

message UnlinkEmployeeFromCompanyResponse {
  bool success = 1;
  string message = 2;
}

message DeleteSubscriptionRequest {
  string company_id = 1;
  string service_id = 2;
}

message DeleteSubscriptionResponse {
  bool success = 1;
  string message = 2;
}

message ClearCompanyOwnerRequest {
  string company_id = 1;
}
