name: Beta Version Management

on:
  push:
    branches: [develop]

jobs:
  create-beta-version:
    name: Create/Update Beta Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Develop Branch
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Prepare Beta Version
        id: version
        run: |
          BASE_VERSION=$(node -e "console.log(require('./package.json').version)")
          
          EXISTING_BETA_TAG=$(git tag -l "${BASE_VERSION}-beta*" | sort -V | tail -n 1)
          
          if [ -n "$EXISTING_BETA_TAG" ]; then
            BETA_NUM=$(echo "$EXISTING_BETA_TAG" | sed -E "s/${BASE_VERSION}-beta\.([0-9]+)/\1/" || echo "0")
            if [ "$BETA_NUM" = "$EXISTING_BETA_TAG" ]; then
              BETA_NUM=1
            else
              BETA_NUM=$((BETA_NUM + 1))
            fi
            VERSION="${BASE_VERSION}-beta.${BETA_NUM}"
            ACTION_TEXT="updated"
          else
            VERSION="${BASE_VERSION}-beta.1"
            ACTION_TEXT="created"
          fi
          

          NPM_DIST_TAG="${BASE_VERSION}-beta"
          
          echo "📦 Version: $VERSION"
          echo "🏷️  NPM dist-tag: $NPM_DIST_TAG"
          echo "🔄 Action: $ACTION_TEXT"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "npm_dist_tag=$NPM_DIST_TAG" >> $GITHUB_OUTPUT
          echo "action_text=$ACTION_TEXT" >> $GITHUB_OUTPUT

      - name: Create/Update Beta Tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ACTION_TEXT="${{ steps.version.outputs.action_text }}"
          
          echo "🔗 Branch: develop"
          echo "📝 Commit: ${{ github.sha }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$ACTION_TEXT" = "updated" ]; then
            echo "🔄 Updating beta version: $VERSION"
            git tag -d "$VERSION" 2>/dev/null || true
            git push origin ":refs/tags/$VERSION" 2>/dev/null || true
          else
            echo "📦 Creating beta version: $VERSION"
          fi
          
          git tag "$VERSION"
          git push origin "$VERSION"
          
          echo "✅ Beta version $VERSION $ACTION_TEXT!"
          echo ""
          echo "📋 Use in your services:"
          echo "   go get github.com/${{ github.repository }}@$VERSION"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate TypeScript code
        run: pnpm generate

      - name: Update package.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          node -e "
          const fs = require('fs');
          const package = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          package.version = '$VERSION';
          fs.writeFileSync('package.json', JSON.stringify(package, null, 2) + '\n');
          "

      - name: Remove old npm beta version
        if: steps.version.outputs.action_text == 'updated'
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "⚠️  Warning: NPM_TOKEN secret not set. Skipping npm unpublish."
            exit 0
          fi
          
          NPM_DIST_TAG="${{ steps.version.outputs.npm_dist_tag }}"
          echo "🗑️  Attempting to unpublish npm versions with dist-tag: $NPM_DIST_TAG"
          
          VERSION_WITH_TAG=$(npm dist-tag ls @ssoeasy-dev/proto 2>/dev/null | grep "^${NPM_DIST_TAG}:" | cut -d: -f2 | xargs)
          
          if [ -n "$VERSION_WITH_TAG" ]; then
            echo "📦 Found version $VERSION_WITH_TAG with dist-tag $NPM_DIST_TAG"
            echo "🗑️  Attempting to unpublish version $VERSION_WITH_TAG..."
            
            if npm unpublish "@ssoeasy-dev/proto@$VERSION_WITH_TAG" 2>/dev/null; then
              echo "✅ Version $VERSION_WITH_TAG successfully unpublished"
            else
              echo "⚠️  Could not unpublish version $VERSION_WITH_TAG"
              echo "   This might be because:"
              echo "   - Version is older than 72 hours (npm restriction)"
              echo "   - Version doesn't exist"
              echo "   - Permission issue"
              echo "   Continuing with dist-tag removal..."
            fi
          else
            echo "ℹ️  No version found with dist-tag $NPM_DIST_TAG"
            echo "   Dist-tag might not exist or already removed"
          fi
          
          echo "🗑️  Removing dist-tag $NPM_DIST_TAG..."
          if npm dist-tag rm @ssoeasy-dev/proto "$NPM_DIST_TAG" 2>/dev/null; then
            echo "✅ NPM dist-tag $NPM_DIST_TAG removed"
          else
            echo "⚠️  Could not remove dist-tag $NPM_DIST_TAG (may not exist)"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish npm beta version
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "⚠️  Warning: NPM_TOKEN secret not set. Skipping npm publish."
            echo "To enable npm publishing, add NPM_TOKEN secret to GitHub repository settings."
            exit 0
          fi
          pnpm publish --no-git-checks --tag ${{ steps.version.outputs.npm_dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
