name: Beta Version Management

on:
  push:
    branches: [develop]

jobs:
  setup:
    name: Setup and Generate
    uses: ./.github/workflows/setup-and-generate.yml
    with:
      ref: develop
      fetch-depth: 0

  create-beta-version:
    name: Create/Update Beta Version
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Develop Branch
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install semver
        run: npm install -g semver

      - name: Find maximum dev version across all branches
        id: max_dev
        run: |
          DEV_TAGS=$(git tag -l | grep -E ".*-dev-.*\.[0-9]+$" | sort -V)
          MAX_VERSION=""
          if [ -n "$DEV_TAGS" ]; then
            VERSIONS=()
            for TAG in $DEV_TAGS; do
              VERSION=$(echo "$TAG" | sed -E 's/-dev-.*//')
              VERSIONS+=("$VERSION")
            done
            MAX_VERSION=$(printf '%s\n' "${VERSIONS[@]}" | sort -V | tail -n1)
          fi
          echo "max_version=$MAX_VERSION" >> $GITHUB_OUTPUT

      - name: Compare with last beta
        id: compare
        run: |
          MAX_VERSION="${{ steps.max_dev.outputs.max_version }}"
          if [ -z "$MAX_VERSION" ]; then
            echo "should_create=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          LAST_BETA_TAG=$(git tag -l | grep -E ".*-beta$" | sort -V | tail -n1)
          if [ -n "$LAST_BETA_TAG" ]; then
            LAST_BETA_VERSION=$(echo "$LAST_BETA_TAG" | sed -E 's/-beta$//')
          else
            LAST_BETA_VERSION="0.0.0"
          fi

          GT=$(node -e "const semver = require('semver'); console.log(semver.gt('$MAX_VERSION', '$LAST_BETA_VERSION'))")
          if [ "$GT" = "true" ]; then
            echo "should_create=true" >> $GITHUB_OUTPUT
            echo "new_version=$MAX_VERSION" >> $GITHUB_OUTPUT
          else
            echo "should_create=false" >> $GITHUB_OUTPUT
          fi

      - name: Update package.json version (beta)
        if: steps.compare.outputs.should_create == 'true'
        run: |
          VERSION="${{ steps.compare.outputs.new_version }}"
          node -e "
            const fs = require('fs');
            const package = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            package.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(package, null, 2) + '\n');
          "

      - name: Commit updated package.json
        if: steps.compare.outputs.should_create == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.compare.outputs.new_version }}" || echo "No changes"
          git push

      - name: Publish npm beta version
        if: steps.compare.outputs.should_create == 'true'
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "⚠️  Warning: NPM_TOKEN secret not set. Skipping npm publish."
            exit 0
          fi
          pnpm publish --no-git-checks --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Beta Tag
        if: steps.compare.outputs.should_create == 'true'
        run: |
          VERSION="${{ steps.compare.outputs.new_version }}"
          BETA_TAG="${VERSION}-beta"

          echo "🔗 Branch: develop"
          echo "📝 Commit: ${{ github.sha }}"
          echo "🏷️  Creating beta tag: $BETA_TAG"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$BETA_TAG"
          git push origin "$BETA_TAG"

          echo "✅ Beta version $BETA_TAG created!"
          echo ""
          echo "📋 Use in your services:"
          echo "   go get github.com/${{ github.repository }}@$BETA_TAG"
