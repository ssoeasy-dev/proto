name: Beta Version Management

on:
  push:
    branches: [develop]
    paths:
      - 'proto/**'
      - 'gen/**'
      - 'package.json'

jobs:
  setup:
    name: Setup and Generate
    uses: ./.github/workflows/setup-and-generate.yml
    with:
      ref: develop
      fetch-depth: 0

  create-beta-version:
    name: Create/Update Beta Version
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Develop Branch
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Find maximum dev version across all branches (or fallback to package.json)
        id: max_dev
        run: |
          DEV_TAGS=$(git tag -l | grep -E "^v.*-dev-.*\.[0-9]+$" | sort -V)
          MAX_VERSION=""
          if [ -n "$DEV_TAGS" ]; then
            VERSIONS=()
            for TAG in $DEV_TAGS; do
              VERSION=$(echo "$TAG" | sed -E 's/-dev-.*//' | sed 's/^v//')   # –£–і–∞–ї—П–µ–Љ v
              VERSIONS+=("$VERSION")
            done
            MAX_VERSION=$(printf '%s\n' "${VERSIONS[@]}" | sort -V | tail -n1)
          fi
          # Fallback: –µ—Б–ї–Є –љ–µ—В dev-—В–µ–≥–Њ–≤, –±–µ—А—С–Љ –≤–µ—А—Б–Є—О –Є–Ј package.json
          if [ -z "$MAX_VERSION" ]; then
            MAX_VERSION=$(node -e "console.log(require('./package.json').version)")
            echo "No dev tags found, using package.json version: $MAX_VERSION"
          fi
          echo "max_version=$MAX_VERSION" >> $GITHUB_OUTPUT

      - name: Determine beta build number
        id: beta_build
        run: |
          VERSION="${{ steps.max_dev.outputs.max_version }}"
          # –Э–∞–є—В–Є –≤—Б–µ beta —В–µ–≥–Є —Б —Н—В–Њ–є –≤–µ—А—Б–Є–µ–є (—Б –љ–Њ–Љ–µ—А–∞–Љ–Є)
          EXISTING_BETA=$(git tag -l | grep -E "^v${VERSION}-beta\.[0-9]+$" | sort -V)
          if [ -z "$EXISTING_BETA" ]; then
            BUILD=1
          else
            LAST=$(echo "$EXISTING_BETA" | tail -n1)
            if [[ "$LAST" =~ -beta\.([0-9]+)$ ]]; then
              BUILD=$(( ${BASH_REMATCH[1]} + 1 ))
            else
              BUILD=1
            fi
          fi
          echo "build_number=$BUILD" >> $GITHUB_OUTPUT

      - name: Prepare full beta version
        id: full_version
        run: |
          VERSION="${{ steps.max_dev.outputs.max_version }}"
          BUILD="${{ steps.beta_build.outputs.build_number }}"
          FULL_VERSION="${VERSION}-beta.${BUILD}"
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json with full beta version
        run: |
          FULL_VERSION="${{ steps.full_version.outputs.full_version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$FULL_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup npm authentication
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        if: env.NODE_AUTH_TOKEN != ''

      - name: Publish npm beta version
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "вЪ†пЄП  Warning: NPM_TOKEN secret not set. Skipping npm publish."
            exit 0
          fi
          pnpm publish --no-git-checks --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Restore package.json
        run: git checkout -- package.json

      - name: Create Beta Tag
        run: |
          FULL_VERSION="v${{ steps.full_version.outputs.full_version }}"

          echo "рЯФЧ Branch: develop"
          echo "рЯУЭ Commit: ${{ github.sha }}"
          echo "рЯПЈпЄП  Creating beta tag: $FULL_VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$FULL_VERSION"
          git push origin "$FULL_VERSION"

          echo "вЬЕ Beta version $FULL_VERSION created!"
          echo ""
          echo "рЯУЛ Use in your services:"
          echo "   go get github.com/${{ github.repository }}@$FULL_VERSION"

      - name: Delete old beta tag without build number (if exists)
        run: |
          VERSION="${{ steps.max_dev.outputs.max_version }}"
          OLD_TAG="v${VERSION}-beta"   # –і–Њ–±–∞–≤–ї—П–µ–Љ v
          if git rev-parse "$OLD_TAG" >/dev/null 2>&1; then
            echo "рЯЧСпЄП  Deleting old beta tag: $OLD_TAG"
            git tag -d "$OLD_TAG" 2>/dev/null || true
            git push origin ":refs/tags/$OLD_TAG" 2>/dev/null || true
          fi
