name: Beta Version Management

on:
  push:
    branches: [develop]

jobs:
  create-beta-version:
    name: Create/Update Beta Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Develop Branch
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Prepare Beta Version
        id: version
        run: |
          BASE_VERSION=$(node -e "console.log(require('./package.json').version)")

          # Ищем существующие beta теги
          EXISTING_BETA_TAGS=$(git tag -l "${BASE_VERSION}-beta.*" | sort -V)

          if [ -n "$EXISTING_BETA_TAGS" ]; then
            LAST_BETA_TAG=$(echo "$EXISTING_BETA_TAGS" | tail -n 1)
            BETA_NUM=$(echo "$LAST_BETA_TAG" | sed -E "s/${BASE_VERSION}-beta\.([0-9]+)/\1/")
            BETA_NUM=$((BETA_NUM + 1))
          else
            BETA_NUM=1
          fi

          VERSION="${BASE_VERSION}-beta.${BETA_NUM}"
          NPM_DIST_TAG="beta"

          echo "📦 Version: $VERSION"
          echo "🏷️  NPM dist-tag: $NPM_DIST_TAG"
          echo "🔢 Beta number: $BETA_NUM"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "npm_dist_tag=$NPM_DIST_TAG" >> $GITHUB_OUTPUT
          echo "beta_number=$BETA_NUM" >> $GITHUB_OUTPUT
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT

      - name: Try to Detect Merged Branch and Cleanup
        continue-on-error: true
        run: |
          BASE_VERSION=$(node -e "console.log(require('./package.json').version)")

          # Получаем последний коммит (мерж-коммит)
          LAST_COMMIT=$(git log -1 --pretty=%B)

          echo "🔍 Last commit message:"
          echo "$LAST_COMMIT"
          echo ""

          # Пытаемся найти имя ветки из сообщения коммита (формат GitHub)
          BRANCH_NAME=""
          if echo "$LAST_COMMIT" | grep -q "Merge pull request"; then
            # Формат: Merge pull request #123 from user/branch-name
            BRANCH_NAME=$(echo "$LAST_COMMIT" | sed -E 's/.* from [^\/]*\/(.*)/\1/')
            echo "✅ Detected merged branch from GitHub merge: $BRANCH_NAME"
          elif echo "$LAST_COMMIT" | grep -q "Merge branch"; then
            # Формат: Merge branch 'branch-name' into develop
            BRANCH_NAME=$(echo "$LAST_COMMIT" | sed -E "s/.*Merge branch '([^']*)'.*/\1/")
            echo "✅ Detected merged branch: $BRANCH_NAME"
          fi

          if [ -n "$BRANCH_NAME" ]; then
            # Нормализуем имя ветки
            BRANCH_PART="${BRANCH_NAME//\//-}"
            BRANCH_PART="${BRANCH_PART//_/-}"
            BRANCH_PART=$(echo "$BRANCH_PART" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')
            
            echo "🔍 Normalized branch name: $BRANCH_PART"
            
            # Ищем и удаляем все dev теги для этой ветки
            DEV_TAGS=$(git tag -l "${BASE_VERSION}-dev-${BRANCH_PART}.*")
            
            if [ -n "$DEV_TAGS" ]; then
              echo "🗑️  Deleting dev tags for merged branch '$BRANCH_NAME':"
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              
              for TAG in $DEV_TAGS; do
                echo "  - $TAG"
                git tag -d "$TAG" 2>/dev/null || true
                git push origin ":refs/tags/$TAG" 2>/dev/null || true
              done
              
              echo "✅ Dev tags for branch '$BRANCH_NAME' deleted"
              
              # Также удаляем npm версии
              if [ -n "$NODE_AUTH_TOKEN" ]; then
                echo "🗑️  Unpublishing npm dev versions for branch '$BRANCH_NAME'..."
                
                # Получаем все версии из npm
                ALL_VERSIONS=$(npm view @ssoeasy-dev/proto versions --json 2>/dev/null || echo "[]")
                
                # Фильтруем версии с префиксом этой ветки
                VERSIONS_TO_DELETE=$(echo "$ALL_VERSIONS" | node -e "
                  const versions = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
                  const prefix = process.argv[1];
                  const matching = versions.filter(v => v.startsWith(prefix));
                  console.log(matching.join(' '));
                " "${BASE_VERSION}-dev-${BRANCH_PART}")
                
                if [ -n "$VERSIONS_TO_DELETE" ]; then
                  for VERSION in $VERSIONS_TO_DELETE; do
                    echo -n "   Unpublishing $VERSION... "
                    npm unpublish "@ssoeasy-dev/proto@$VERSION" 2>/dev/null && echo "✅" || echo "⚠️"
                  done
                fi
                
                # Удаляем dist-tag
                npm dist-tag rm @ssoeasy-dev/proto "dev-${BRANCH_PART}" 2>/dev/null || true
              fi
            else
              echo "ℹ️  No dev tags found for branch '$BRANCH_NAME'"
            fi
          else
            echo "⚠️  Could not detect merged branch from commit message"
            echo "ℹ️  Dev tags cleanup will be handled by PR close event"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Beta Tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          echo "🔗 Branch: develop"
          echo "📝 Commit: ${{ github.sha }}"
          echo "🏷️  Creating beta tag: $VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Создаем новый тег
          git tag "$VERSION"
          git push origin "$VERSION"

          echo "✅ Beta version $VERSION created!"
          echo ""
          echo "📋 Use in your services:"
          echo "   go get github.com/${{ github.repository }}@$VERSION"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate TypeScript code
        run: pnpm generate

      - name: Update package.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          node -e "
          const fs = require('fs');
          const package = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          package.version = '$VERSION';
          fs.writeFileSync('package.json', JSON.stringify(package, null, 2) + '\n');
          "

      - name: Publish npm beta version
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "⚠️  Warning: NPM_TOKEN secret not set. Skipping npm publish."
            echo "To enable npm publishing, add NPM_TOKEN secret to GitHub repository settings."
            exit 0
          fi
          pnpm publish --no-git-checks --tag ${{ steps.version.outputs.npm_dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
