name: Dev Version Management

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [develop, main]

jobs:
  create-dev-version:
    name: Create/Update Dev Version
    if: github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Prepare Dev Version
        id: version
        run: |
          BASE_VERSION=$(node -e "console.log(require('./package.json').version)")
          BRANCH_NAME="${{ github.head_ref }}"
          BRANCH_PART="${BRANCH_NAME//\//-}"
          BRANCH_PART="${BRANCH_PART//_/-}"
          BRANCH_PART=$(echo "$BRANCH_PART" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')

          VERSION="${BASE_VERSION}-dev-${BRANCH_PART}"
          NPM_DIST_TAG="dev-${BRANCH_PART}"

          if [ "${{ github.event.action }}" = "synchronize" ]; then
            ACTION_TEXT="updated"
          else
            ACTION_TEXT="created"
          fi
          
          echo "📦 Version: $VERSION"
          echo "🏷️  NPM dist-tag: $NPM_DIST_TAG"
          echo "🔄 Action: $ACTION_TEXT"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "npm_dist_tag=$NPM_DIST_TAG" >> $GITHUB_OUTPUT
          echo "action_text=$ACTION_TEXT" >> $GITHUB_OUTPUT

      - name: Create/Update Dev Tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ACTION_TEXT="${{ steps.version.outputs.action_text }}"
          
          echo "🔗 Branch: ${{ github.head_ref }}"
          echo "📝 Commit: ${{ github.event.pull_request.head.sha }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$ACTION_TEXT" = "updated" ]; then
            echo "🔄 Updating dev version: $VERSION"
            git tag -d "$VERSION" 2>/dev/null || true
            git push origin ":refs/tags/$VERSION" 2>/dev/null || true
          else
            echo "📦 Creating dev version: $VERSION"
          fi
          
          git tag "$VERSION"
          git push origin "$VERSION"
          
          echo "✅ Dev version $VERSION $ACTION_TEXT!"
          echo ""
          echo "📋 Use in your services:"
          echo "   go get github.com/${{ github.repository }}@$VERSION"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate TypeScript code
        run: pnpm generate

      - name: Update package.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          node -e "
          const fs = require('fs');
          const package = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          package.version = '$VERSION';
          fs.writeFileSync('package.json', JSON.stringify(package, null, 2) + '\n');
          "

      - name: Remove old npm dev version
        if: steps.version.outputs.action_text == 'updated'
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "⚠️  Warning: NPM_TOKEN secret not set. Skipping npm unpublish."
            exit 0
          fi
          
          NPM_DIST_TAG="${{ steps.version.outputs.npm_dist_tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          echo "🗑️  Removing old npm dev version before publishing new one: $VERSION"
          
          # Пытаемся удалить версию в любом случае (даже если npm view её не видит из-за кэша)
          echo "🗑️  Attempting to unpublish version $VERSION..."
          UNPUBLISH_OUTPUT=$(npm unpublish "@ssoeasy-dev/proto@$VERSION" 2>&1 || true)
          
          if echo "$UNPUBLISH_OUTPUT" | grep -q "successfully unpublished\|removed"; then
            echo "✅ Version $VERSION successfully unpublished"
          elif echo "$UNPUBLISH_OUTPUT" | grep -q "You cannot unpublish\|Cannot unpublish\|does not exist\|404"; then
            echo "ℹ️  Version $VERSION does not exist or cannot be unpublished (may be older than 72 hours)"
            echo "   Output: $UNPUBLISH_OUTPUT"
          else
            echo "⚠️  Unpublish attempt result: $UNPUBLISH_OUTPUT"
          fi
          
          # Удаляем dist-tag если он существует
          VERSION_WITH_TAG=$(npm dist-tag ls @ssoeasy-dev/proto 2>/dev/null | grep "^${NPM_DIST_TAG}:" | cut -d: -f2 | xargs)
          if [ -n "$VERSION_WITH_TAG" ]; then
            echo "🗑️  Removing dist-tag $NPM_DIST_TAG..."
            npm dist-tag rm @ssoeasy-dev/proto "$NPM_DIST_TAG" 2>/dev/null || {
              echo "⚠️  Could not remove dist-tag $NPM_DIST_TAG (may not exist)"
            }
          fi
          
          # Ждем немного для распространения изменений в npm registry
          echo "⏳ Waiting for npm registry to process changes..."
          sleep 90
          
          echo "✅ Old npm dev version cleanup completed"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish npm dev version
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "⚠️  Warning: NPM_TOKEN secret not set. Skipping npm publish."
            echo "To enable npm publishing, add NPM_TOKEN secret to GitHub repository settings."
            exit 0
          fi
          pnpm publish --no-git-checks --tag ${{ steps.version.outputs.npm_dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Comment on PR (create/update)
        uses: actions/github-script@v6
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const npmDistTag = '${{ steps.version.outputs.npm_dist_tag }}';
            const repoFullName = `${context.repo.owner}/${context.repo.repo}`;
            const action = context.payload.action;
            const commitSha = context.payload.pull_request.head.sha.substring(0, 7);
            
            let title, message;
            if (action === 'synchronize') {
              title = '🔄 Dev Version Updated';
              message = `Dev version \`${version}\` has been updated to the latest commit (\`${commitSha}\`).`;
            } else {
              title = '📦 Dev Version Created';
              message = `Dev version \`${version}\` has been created for this PR.`;
            }
            
            const body = [
              `## ${title}`,
              '',
              message,
              '',
              '**Usage in Go services:**',
              '```bash',
              `go get github.com/${repoFullName}@${version}`,
              '```',
              '',
              '**In go.mod:**',
              '```go',
              `require github.com/${repoFullName} ${version}`,
              '```',
              '',
              '**Usage in TypeScript/JavaScript:**',
              '```bash',
              `npm install @ssoeasy-dev/proto@${npmDistTag}`,
              '```',
              '',
              `**Version:** \`${version}\``,
              '',
              '> ⚠️ This is a temporary development version. It will be automatically updated on each push and deleted after merging this PR.'
            ].join('\n');
            
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Dev Version')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  cleanup-and-release:
    name: Cleanup Dev Version
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Prepare Dev Version for Cleanup
        id: version
        run: |
          BASE_VERSION=$(node -e "console.log(require('./package.json').version)")
          BRANCH_NAME="${{ github.head_ref }}"
          BRANCH_PART="${BRANCH_NAME//\//-}"
          BRANCH_PART="${BRANCH_PART//_/-}"
          BRANCH_PART=$(echo "$BRANCH_PART" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')
          
          VERSION="${BASE_VERSION}-dev-${BRANCH_PART}"
          NPM_DIST_TAG="dev-${BRANCH_PART}"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "npm_dist_tag=$NPM_DIST_TAG" >> $GITHUB_OUTPUT

      - name: Delete Dev Tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          echo "🗑️  Deleting dev version: $VERSION"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git push origin ":refs/tags/$VERSION" 2>/dev/null || {
            echo "⚠️  Tag $VERSION not found (already deleted or never created)"
          }
          
          echo "✅ Dev version $VERSION deleted"

      - name: Unpublish npm dev version
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "⚠️  Warning: NPM_TOKEN secret not set. Skipping npm unpublish."
            exit 0
          fi
          
          NPM_DIST_TAG="${{ steps.version.outputs.npm_dist_tag }}"
          echo "🗑️  Attempting to unpublish npm versions with dist-tag: $NPM_DIST_TAG"
          
          VERSION_WITH_TAG=$(npm dist-tag ls @ssoeasy-dev/proto 2>/dev/null | grep "^${NPM_DIST_TAG}:" | cut -d: -f2 | xargs)
          
          if [ -n "$VERSION_WITH_TAG" ]; then
            echo "📦 Found version $VERSION_WITH_TAG with dist-tag $NPM_DIST_TAG"
            echo "🗑️  Attempting to unpublish version $VERSION_WITH_TAG..."
            
            if npm unpublish "@ssoeasy-dev/proto@$VERSION_WITH_TAG" 2>/dev/null; then
              echo "✅ Version $VERSION_WITH_TAG successfully unpublished"
            else
              echo "⚠️  Could not unpublish version $VERSION_WITH_TAG"
              echo "   This might be because:"
              echo "   - Version is older than 72 hours (npm restriction)"
              echo "   - Version doesn't exist"
              echo "   - Permission issue"
              echo "   Continuing with dist-tag removal..."
            fi
          else
            echo "ℹ️  No version found with dist-tag $NPM_DIST_TAG"
            echo "   Dist-tag might not exist or already removed"
          fi
          
          echo "🗑️  Removing dist-tag $NPM_DIST_TAG..."
          if npm dist-tag rm @ssoeasy-dev/proto "$NPM_DIST_TAG" 2>/dev/null; then
            echo "✅ NPM dist-tag $NPM_DIST_TAG removed"
          else
            echo "⚠️  Could not remove dist-tag $NPM_DIST_TAG (may not exist)"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
