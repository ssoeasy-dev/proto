name: Dev Version Management

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [develop]

jobs:
  create-dev-version:
    name: Create/Update Dev Version
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Prepare Dev Version
        id: version
        run: |
          BASE_VERSION=$(node -e "console.log(require('./package.json').version)")
          BRANCH_NAME="${{ github.head_ref }}"
          BRANCH_PART="${BRANCH_NAME//\//-}"
          BRANCH_PART="${BRANCH_PART//_/-}"
          BRANCH_PART=$(echo "$BRANCH_PART" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')

          # Ищем существующие теги для этой ветки
          EXISTING_TAGS=$(git tag -l "${BASE_VERSION}-dev-${BRANCH_PART}.*" | sort -V)

          if [ -n "$EXISTING_TAGS" ]; then
            LAST_TAG=$(echo "$EXISTING_TAGS" | tail -n 1)
            # Извлекаем номер после последней точки
            LAST_NUM=$(echo "$LAST_TAG" | sed -E "s/${BASE_VERSION}-dev-${BRANCH_PART}\\.//")
            # Увеличиваем номер
            NEW_NUM=$((LAST_NUM + 1))
          else
            NEW_NUM=1
          fi

          VERSION="${BASE_VERSION}-dev-${BRANCH_PART}.${NEW_NUM}"
          GIT_TAG="${BASE_VERSION}-dev-${BRANCH_PART}.${NEW_NUM}"
          NPM_DIST_TAG="dev-${BRANCH_PART}"

          echo "📦 Version: $VERSION"
          echo "🏷️  NPM dist-tag: $NPM_DIST_TAG"
          echo "🔢 Build number: $NEW_NUM"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "npm_dist_tag=$NPM_DIST_TAG" >> $GITHUB_OUTPUT
          echo "git_tag=$GIT_TAG" >> $GITHUB_OUTPUT
          echo "build_number=$NEW_NUM" >> $GITHUB_OUTPUT
          echo "branch_part=$BRANCH_PART" >> $GITHUB_OUTPUT

      - name: Create/Update Dev Tag
        run: |
          GIT_TAG="${{ steps.version.outputs.git_tag }}"

          echo "🔗 Branch: ${{ github.head_ref }}"
          echo "📝 Commit: ${{ github.event.pull_request.head.sha }}"
          echo "🏷️  Creating tag: $GIT_TAG"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Создаем новый тег
          git tag "$GIT_TAG"
          git push origin "$GIT_TAG"

          echo "✅ Dev version $GIT_TAG created!"
          echo ""
          echo "📋 Use in your services:"
          echo "   go get github.com/${{ github.repository }}@$GIT_TAG"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate TypeScript code
        run: pnpm generate

      - name: Update package.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          node -e "
          const fs = require('fs');
          const package = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          package.version = '$VERSION';
          fs.writeFileSync('package.json', JSON.stringify(package, null, 2) + '\n');
          "

      - name: Publish npm dev version
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "⚠️  Warning: NPM_TOKEN secret not set. Skipping npm publish."
            echo "To enable npm publishing, add NPM_TOKEN secret to GitHub repository settings."
            exit 0
          fi
          pnpm publish --no-git-checks --tag ${{ steps.version.outputs.npm_dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const gitTag = '${{ steps.version.outputs.git_tag }}';
            const npmDistTag = '${{ steps.version.outputs.npm_dist_tag }}';
            const buildNumber = '${{ steps.version.outputs.build_number }}';
            const repoFullName = `${context.repo.owner}/${context.repo.repo}`;

            const body = [
              `## 📦 Dev Version Created (Build #${buildNumber})`,
              '',
              `Dev version \`${gitTag}\` has been created for this PR.`,
              '',
              '**Usage in Go services:**',
              '```bash',
              `go get github.com/${repoFullName}@${gitTag}`,
              '```',
              '',
              '**In go.mod:**',
              '```go',
              `require github.com/${repoFullName} ${gitTag}`,
              '```',
              '',
              '**Usage in TypeScript/JavaScript:**',
              '```bash',
              `npm install @ssoeasy-dev/proto@${npmDistTag}`,
              '```',
              '',
              `**Git tag:** \`${gitTag}\``,
              `**NPM version:** \`${version}\``,
              `**Build number:** \`${buildNumber}\``,
              '',
              '> ⚠️ This is a temporary development version. New pushes will create new versions with incremented build numbers.',
              '> 🗑️  All dev versions will be automatically deleted when this PR is closed.'
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Dev Version')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  cleanup-and-release:
    name: Cleanup Dev Version
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare Dev Version for Cleanup
        id: version
        run: |
          BASE_VERSION=$(node -e "console.log(require('./package.json').version)")
          BRANCH_NAME="${{ github.head_ref }}"
          BRANCH_PART="${BRANCH_NAME//\//-}"
          BRANCH_PART="${BRANCH_PART//_/-}"
          BRANCH_PART=$(echo "$BRANCH_PART" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')

          GIT_TAG_PREFIX="${BASE_VERSION}-dev-${BRANCH_PART}"
          NPM_DIST_TAG="dev-${BRANCH_PART}"

          echo "git_tag_prefix=$GIT_TAG_PREFIX" >> $GITHUB_OUTPUT
          echo "npm_dist_tag=$NPM_DIST_TAG" >> $GITHUB_OUTPUT

      - name: Delete Dev Tags
        run: |
          GIT_TAG_PREFIX="${{ steps.version.outputs.git_tag_prefix }}"

          echo "🗑️  Deleting all dev tags with prefix: $GIT_TAG_PREFIX"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Находим все теги с префиксом
          TAGS_TO_DELETE=$(git tag -l "${GIT_TAG_PREFIX}.*")

          if [ -n "$TAGS_TO_DELETE" ]; then
            echo "📦 Found tags to delete:"
            for TAG in $TAGS_TO_DELETE; do
              echo "  - $TAG"
            done
            
            for TAG in $TAGS_TO_DELETE; do
              echo "🗑️  Deleting tag: $TAG"
              git tag -d "$TAG" 2>/dev/null || true
              git push origin ":refs/tags/$TAG" 2>/dev/null || {
                echo "  ⚠️  Could not delete tag $TAG (may not exist)"
              }
            done
            
            echo "✅ All dev tags with prefix $GIT_TAG_PREFIX deleted"
          else
            echo "ℹ️  No tags found with prefix $GIT_TAG_PREFIX"
          fi

      - name: Unpublish npm dev versions
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "⚠️  Warning: NPM_TOKEN secret not set. Skipping npm unpublish."
            exit 0
          fi

          GIT_TAG_PREFIX="${{ steps.version.outputs.git_tag_prefix }}"
          NPM_DIST_TAG="${{ steps.version.outputs.npm_dist_tag }}"

          echo "🗑️  Cleaning up npm dev versions with prefix: $GIT_TAG_PREFIX"

          # Получаем все версии из npm
          ALL_VERSIONS=$(npm view @ssoeasy-dev/proto versions --json 2>/dev/null || echo "[]")

          # Фильтруем версии с нужным префиксом
          VERSIONS_TO_DELETE=$(echo "$ALL_VERSIONS" | node -e "
            const versions = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
            const prefix = process.argv[1];
            const matching = versions.filter(v => v.startsWith(prefix));
            console.log(matching.join(' '));
          " "$GIT_TAG_PREFIX")

          if [ -n "$VERSIONS_TO_DELETE" ]; then
            echo "📦 Found npm versions to delete:"
            for VERSION in $VERSIONS_TO_DELETE; do
              echo "   - $VERSION"
            done
            
            echo ""
            echo "🗑️  Attempting to unpublish versions..."
            UNPUBLISHED_COUNT=0
            FAILED_COUNT=0
            
            for VERSION in $VERSIONS_TO_DELETE; do
              echo -n "   Unpublishing $VERSION... "
              if npm unpublish "@ssoeasy-dev/proto@$VERSION" 2>/dev/null; then
                echo "✅"
                UNPUBLISHED_COUNT=$((UNPUBLISHED_COUNT + 1))
              else
                echo "⚠️  (failed or doesn't exist)"
                FAILED_COUNT=$((FAILED_COUNT + 1))
              fi
            done
            
            echo ""
            echo "📊 Summary:"
            echo "   ✅ Successfully unpublished: $UNPUBLISHED_COUNT"
            echo "   ⚠️  Failed or not found: $FAILED_COUNT"
          else
            echo "ℹ️  No npm versions found matching prefix: $GIT_TAG_PREFIX"
          fi

          echo ""
          echo "🗑️  Removing npm dist-tag $NPM_DIST_TAG..."
          if npm dist-tag rm @ssoeasy-dev/proto "$NPM_DIST_TAG" 2>/dev/null; then
            echo "✅ NPM dist-tag $NPM_DIST_TAG removed"
          else
            echo "⚠️  Could not remove dist-tag $NPM_DIST_TAG (may not exist)"
          fi

          echo "✅ Cleanup completed"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
