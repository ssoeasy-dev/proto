name: Main Version Management

on:
  push:
    branches: [main]

jobs:
  create-main-version:
    name: Create Main Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Prepare Main Version
        id: version
        run: |
          BASE_VERSION=$(node -e "console.log(require('./package.json').version)")

          VERSION="$BASE_VERSION"
          NPM_DIST_TAG="latest"

          echo "📦 Version: $VERSION"
          echo "🏷️  NPM dist-tag: $NPM_DIST_TAG"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "npm_dist_tag=$NPM_DIST_TAG" >> $GITHUB_OUTPUT

      - name: Create Main Tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          echo "🔗 Branch: main"
          echo "📝 Commit: ${{ github.sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Удаляем старый тег, если существует
          git tag -d "$VERSION" 2>/dev/null || true
          git push origin ":refs/tags/$VERSION" 2>/dev/null || true

          # Создаем новый тег
          git tag "$VERSION"
          git push origin "$VERSION"

          echo "✅ Main version $VERSION tagged!"
          echo ""
          echo "📋 Use in your services:"
          echo "   go get github.com/${{ github.repository }}@$VERSION"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate TypeScript code
        run: pnpm generate

      - name: Publish npm main version
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "⚠️  Warning: NPM_TOKEN secret not set. Skipping npm publish."
            echo "To enable npm publishing, add NPM_TOKEN secret to GitHub repository settings."
            exit 0
          fi
          pnpm publish --no-git-checks --tag ${{ steps.version.outputs.npm_dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
