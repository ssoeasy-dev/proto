name: Pre-Release (Develop)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # Pre-release версии: v1.0.0-beta.1, v1.0.0-rc.1
  workflow_dispatch:
    inputs:
      version:
        description: 'Pre-release version (e.g., v1.0.0-beta.1, v1.0.0-rc.1)'
        required: true
        type: string

jobs:
  pre-release:
    name: Create Pre-Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Pre-Release is from Develop Branch
        run: |
          # Проверяем формат версии (должно быть -beta, -rc и т.д.)
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}"
          VERSION="${VERSION#refs/tags/}"
          
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(beta|rc|alpha)\.[0-9]+$ ]]; then
            echo "❌ Error: Pre-releases must follow format v1.0.0-beta.1, v1.0.0-rc.1, v1.0.0-alpha.1"
            echo "Got: $VERSION"
            echo "For production releases use the Production Release workflow from main branch"
            exit 1
          fi
          
          # Для ручного запуска проверяем, что мы на develop
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
            if [ "$CURRENT_BRANCH" != "develop" ]; then
              echo "❌ Error: Pre-releases can only be created from the develop branch!"
              echo "Current branch: $CURRENT_BRANCH"
              exit 1
            fi
            echo "✅ Running on develop branch"
          else
            # Для тегов проверяем историю
            TAG_COMMIT=$(git rev-list -n 1 $GITHUB_REF)
            
            if ! git merge-base --is-ancestor $TAG_COMMIT origin/develop; then
              echo "❌ Error: Pre-release tags can only be created from the develop branch!"
              echo "This tag points to commit $TAG_COMMIT which is not in develop branch history."
              exit 1
            fi
            
            echo "✅ Tag is from develop branch"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Get Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Tag (for manual release)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v1
        with:
          name: Pre-Release ${{ steps.tag.outputs.tag }} (Develop)
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate TypeScript code
        run: pnpm generate

      - name: Sync version from git tag
        run: |
          chmod +x scripts/sync-version.sh
          ./scripts/sync-version.sh ${{ steps.tag.outputs.tag }}

      - name: Publish to npm (pre-release)
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "⚠️  Warning: NPM_TOKEN secret not set. Skipping npm publish."
            echo "To enable npm publishing, add NPM_TOKEN secret to GitHub repository settings."
            exit 0
          fi
          pnpm publish --no-git-checks --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Announce Pre-Release
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          NPM_VERSION="${VERSION#v}"
          echo "✅ Pre-Release $VERSION created!"
          echo "🧪 This is a development version for testing"
          echo "📦 Go developers can use:"
          echo "   go get github.com/${{ github.repository }}@$VERSION"
          echo "📦 NPM package published (beta tag):"
          echo "   npm install @ssoeasy-dev/proto@$NPM_VERSION"




